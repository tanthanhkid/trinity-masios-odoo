# Odoo Production Nginx Configuration
# Place in /etc/nginx/sites-available/odoo.conf
# ln -s /etc/nginx/sites-available/odoo.conf /etc/nginx/sites-enabled/

# Upstreams
upstream odoo {
    server 127.0.0.1:8069;
}
upstream odoochat {
    server 127.0.0.1:8072;
}

# WebSocket upgrade map
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# HTTP -> HTTPS redirect
server {
    listen 80;
    server_name odoo.example.com;
    rewrite ^(.*) https://$host$1 permanent;
}

# Main HTTPS server
server {
    listen 443 ssl;
    server_name odoo.example.com;

    # SSL (Let's Encrypt recommended)
    ssl_certificate /etc/letsencrypt/live/odoo.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/odoo.example.com/privkey.pem;
    ssl_session_timeout 30m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # Timeouts
    proxy_read_timeout 720s;
    proxy_connect_timeout 720s;
    proxy_send_timeout 720s;

    # Logging
    access_log /var/log/nginx/odoo.access.log;
    error_log /var/log/nginx/odoo.error.log;

    # Request size (for file uploads)
    client_max_body_size 200m;

    # Security: block database manager in production
    # Uncomment these lines for production:
    # location ~* ^/web/database {
    #     deny all;
    #     return 404;
    # }

    # WebSocket - redirect to Odoo gevent port
    location /websocket {
        proxy_pass http://odoochat;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains";
        proxy_cookie_flags session_id samesite=lax secure;
    }

    # Serve static files directly (performance)
    location ~* ^/[^/]+/static/.+$ {
        # Adjust root to your addons path
        # root /opt/odoo/odoo-server/addons;
        # try_files $uri @odoo;
        proxy_pass http://odoo;
        expires 24h;
        add_header Content-Security-Policy "default-src 'none'";
    }

    # X-Accel for filestore (optional, requires --x-sendfile flag)
    location /web/filestore {
        internal;
        alias /opt/odoo/.local/share/Odoo/filestore;
        add_header X-Content-Type-Options nosniff;
    }

    # Main Odoo backend
    location / {
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_redirect off;
        proxy_pass http://odoo;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains";
        proxy_cookie_flags session_id samesite=lax secure;
    }

    # Gzip compression
    gzip on;
    gzip_types text/css text/scss text/plain text/xml application/xml application/json application/javascript;
    gzip_min_length 1000;
}
