<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kiểm thử AI Agent Odoo - OpenClaw | Masi OS</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --accent:#E8613C;
    --accent-light:#FDECE6;
    --accent-dark:#C94E2E;
    --bg:#F4F5F7;
    --chat-bg:#E8E8E8;
    --user-bubble:#E8613C;
    --user-text:#fff;
    --bot-bubble:#fff;
    --bot-text:#222;
    --shadow:0 2px 12px rgba(0,0,0,.08);
    --radius:18px;
    --font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  }
  html,body{height:100%;font-family:var(--font);background:#1a1a2e;color:#333;overflow:hidden}

  /* Slide container */
  .deck{position:relative;width:100%;height:100%;overflow:hidden}
  .slide{
    position:absolute;inset:0;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:24px;
    opacity:0;pointer-events:none;
    transition:opacity .4s ease,transform .4s ease;
    transform:translateX(60px);
    background:var(--bg);
  }
  .slide.active{opacity:1;pointer-events:auto;transform:translateX(0)}
  .slide.prev{transform:translateX(-60px)}

  /* Cover & Summary slides */
  .slide-cover,.slide-summary{
    background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);
    color:#fff;text-align:center;
  }
  .slide-cover h1{font-size:2.4em;margin-bottom:12px;background:linear-gradient(90deg,var(--accent),#F5A623);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .slide-cover h2{font-size:1.2em;font-weight:400;color:#bbb;margin-bottom:32px}
  .slide-cover .cover-details{display:flex;gap:24px;justify-content:center;flex-wrap:wrap;margin-top:16px}
  .slide-cover .cover-badge{background:rgba(232,97,60,.15);border:1px solid rgba(232,97,60,.3);border-radius:12px;padding:12px 20px;font-size:.95em;color:#eee}
  .brand-logo{font-size:3.2em;margin-bottom:8px}
  .brand-name{font-size:1em;color:var(--accent);font-weight:700;letter-spacing:2px;margin-bottom:24px}

  /* Test case slide */
  .tc-slide{padding:16px 24px}
  .tc-header{
    width:100%;max-width:720px;
    display:flex;align-items:center;gap:12px;
    margin-bottom:12px;
  }
  .tc-number{
    background:var(--accent);color:#fff;
    width:36px;height:36px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-weight:700;font-size:.95em;flex-shrink:0;
  }
  .tc-title{font-size:1.15em;font-weight:600;color:#333}

  /* Chat container */
  .chat-wrap{
    width:100%;max-width:720px;
    flex:1;
    background:linear-gradient(180deg,#DCE4E8 0%,#C8D6DC 100%);
    border-radius:16px;
    padding:16px 12px;
    overflow-y:auto;
    display:flex;flex-direction:column;gap:8px;
    box-shadow:var(--shadow);
    position:relative;
  }
  .chat-wrap::before{
    content:'';position:absolute;inset:0;
    background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23000' fill-opacity='.02'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    border-radius:16px;pointer-events:none;
  }

  /* Bubbles */
  .msg{display:flex;align-items:flex-end;gap:6px;position:relative;z-index:1;max-width:92%}
  .msg-user{align-self:flex-end;flex-direction:row-reverse}
  .msg-bot{align-self:flex-start}
  .msg-avatar{
    width:30px;height:30px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-size:16px;flex-shrink:0;
    background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.12);
  }
  .msg-bubble{
    padding:8px 12px;border-radius:var(--radius);
    position:relative;line-height:1.45;font-size:.88em;
    box-shadow:0 1px 2px rgba(0,0,0,.08);
    max-width:calc(100% - 44px);
  }
  .msg-user .msg-bubble{
    background:var(--user-bubble);color:var(--user-text);
    border-bottom-right-radius:4px;
  }
  .msg-bot .msg-bubble{
    background:var(--bot-bubble);color:var(--bot-text);
    border-bottom-left-radius:4px;
  }
  .msg-time{font-size:.65em;color:rgba(0,0,0,.35);margin-top:2px;text-align:right}
  .msg-user .msg-time{color:rgba(255,255,255,.6)}

  /* Tables inside bubbles */
  .msg-bubble table{
    width:100%;border-collapse:collapse;margin:6px 0;font-size:.9em;
  }
  .msg-bubble th,.msg-bubble td{
    padding:3px 8px;text-align:left;border-bottom:1px solid #eee;
  }
  .msg-bubble th{font-weight:600;color:#555;font-size:.85em}
  .msg-bubble .section-title{font-weight:600;margin:8px 0 4px;color:#333}
  .msg-bubble .status-good{color:#27AE60}
  .msg-bubble .note{margin-top:6px;padding:6px 8px;background:#FFF8E1;border-radius:8px;font-size:.88em;color:#795548}
  .msg-bubble ul{margin:4px 0 4px 16px;padding:0}
  .msg-bubble li{margin:2px 0}

  /* Navigation */
  .nav-bar{
    position:fixed;bottom:0;left:0;right:0;
    display:flex;align-items:center;justify-content:center;gap:12px;
    padding:12px 24px;
    background:rgba(26,26,46,.92);backdrop-filter:blur(8px);
    z-index:100;
  }
  .nav-btn{
    background:var(--accent);color:#fff;border:none;
    padding:8px 20px;border-radius:8px;cursor:pointer;
    font-size:.9em;font-weight:600;
    transition:background .2s;
  }
  .nav-btn:hover{background:var(--accent-dark)}
  .nav-btn:disabled{opacity:.35;cursor:default}
  .nav-dots{display:flex;gap:6px;align-items:center}
  .nav-dot{
    width:8px;height:8px;border-radius:50%;
    background:rgba(255,255,255,.25);border:none;cursor:pointer;
    transition:all .2s;padding:0;
  }
  .nav-dot.active{background:var(--accent);transform:scale(1.3)}
  .slide-indicator{color:rgba(255,255,255,.5);font-size:.85em;min-width:48px;text-align:center}

  /* Summary slide */
  .summary-content{max-width:800px;text-align:left}
  .summary-content h2{font-size:1.8em;margin-bottom:20px;text-align:center;background:linear-gradient(90deg,var(--accent),#F5A623);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .summary-table{width:100%;border-collapse:collapse;margin:16px 0}
  .summary-table th,.summary-table td{padding:8px 12px;text-align:left;border-bottom:1px solid rgba(255,255,255,.1)}
  .summary-table th{color:var(--accent);font-size:.85em;text-transform:uppercase;letter-spacing:1px}
  .summary-table td{color:#ddd;font-size:.9em}
  .summary-badge{display:inline-block;padding:2px 10px;border-radius:6px;font-size:.8em;font-weight:600}
  .badge-pass{background:rgba(39,174,96,.2);color:#2ECC71}
  .tools-list{display:flex;flex-wrap:wrap;gap:6px;margin:12px 0}
  .tool-chip{background:rgba(232,97,60,.15);border:1px solid rgba(232,97,60,.25);color:#eee;padding:3px 10px;border-radius:6px;font-size:.78em;font-family:monospace}
  .cta-box{
    margin-top:24px;padding:20px;text-align:center;
    background:rgba(232,97,60,.1);border:1px solid rgba(232,97,60,.3);border-radius:12px;
  }
  .cta-box p{color:#ccc;margin:4px 0;font-size:.95em}
  .cta-box .bot-name{color:var(--accent);font-weight:700;font-size:1.05em}
  .summary-note{color:#aaa;font-size:.88em;margin-top:12px;font-style:italic;text-align:center}

  /* Print */
  @media print{
    html,body{overflow:visible;height:auto;background:#fff}
    .nav-bar{display:none}
    .slide{
      position:relative;opacity:1;pointer-events:auto;transform:none;
      page-break-after:always;min-height:100vh;
    }
    .slide-cover,.slide-summary{background:#1a1a2e !important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
    .chat-wrap{break-inside:avoid}
  }

  /* Responsive */
  @media(max-width:600px){
    .slide-cover h1{font-size:1.6em}
    .tc-header{flex-wrap:wrap}
    .msg-bubble{font-size:.82em}
    .nav-bar{padding:8px 12px;gap:8px}
    .summary-content{padding:0 8px}
  }
</style>
</head>

// Dots
const dotsEl = document.getElementById('dots');
for(let i=0;i<total;i++){
  const d=document.createElement('button');
  d.className='nav-dot'+(i===0?' active':'');
  d.onclick=()=>goTo(i);
  dotsEl.appendChild(d);
}

function goTo(n){
  if(n<0||n>=total) return;
  const prev=document.getElementById('slide-'+cur);
  prev.classList.remove('active');
  prev.classList.toggle('prev',n>cur);
  cur=n;
  const next=document.getElementById('slide-'+cur);
  next.classList.remove('prev');
  next.classList.add('active');
  document.querySelectorAll('.nav-dot').forEach((d,i)=>d.classList.toggle('active',i===cur));
  document.getElementById('indicator').textContent=(cur+1)+'/'+total;
  document.getElementById('prevBtn').disabled=cur===0;
  document.getElementById('nextBtn').disabled=cur===total-1;
}
function go(d){goTo(cur+d)}

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='ArrowDown') go(1);
  else if(e.key==='ArrowLeft'||e.key==='ArrowUp') go(-1);
});

// Touch swipe
let tx=0;
deck.addEventListener('touchstart',e=>{tx=e.touches[0].clientX},{passive:true});
deck.addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-tx;if(Math.abs(dx)>50){dx<0?go(1):go(-1)}},{passive:true});

// Init
goTo(0);
</script>
